<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History — 歴史年表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+JP:wght@300;400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --beige: #f0ebe0;
    --beige-dark: #e0d8c8;
    --beige-light: #f7f4ee;
    --red: #c0392b;
    --red-dark: #96281b;
    --red-bright: #e74c3c;
    --black: #1a1410;
    --black-soft: #2c2416;
    --gold: #b8963e;
    --brown: #6b4c2a;
    --gray: #888070;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--beige);
    color: var(--black);
    font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* Grain texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    padding: 3rem 6rem 2rem;
    border-bottom: 2px solid var(--black);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .header-left {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .header-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.75rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gray);
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 900;
    font-style: italic;
    line-height: 0.9;
    color: var(--black);
    letter-spacing: -0.02em;
  }

  .header-title span {
    color: var(--red);
  }

  .header-right {
    text-align: right;
  }

  .header-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gray);
    line-height: 2;
  }

  /* Decorative cross marks */
  .cross {
    display: inline-block;
    color: var(--red);
    font-size: 1.2em;
    margin: 0 0.5em;
  }

  /* ── CORNER LABELS ── */
  .corner-tl, .corner-tr, .corner-bl, .corner-br {
    position: fixed;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--gray);
    opacity: 0.5;
    z-index: 100;
  }
  .corner-tl { top: 1.5rem; left: 1.5rem; writing-mode: vertical-rl; }
  .corner-tr { top: 1.5rem; right: 1.5rem; writing-mode: vertical-rl; transform: rotate(180deg); }
  .corner-bl { bottom: 1.5rem; left: 1.5rem; }
  .corner-br { bottom: 1.5rem; right: 1.5rem; }

  /* ── INTRO BANNER ── */
  .intro-banner {
    background: var(--black);
    color: var(--beige);
    padding: 1.2rem 6rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .intro-banner p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    font-style: italic;
  }

  .intro-banner .dot-line {
    flex: 1;
    height: 1px;
    background: repeating-linear-gradient(to right, var(--red) 0, var(--red) 4px, transparent 4px, transparent 10px);
    margin: 0 2rem;
  }

  /* ── MAIN LAYOUT ── */
  main {
    display: grid;
    grid-template-columns: 220px 1fr;
    height: calc(100vh - 160px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    border-right: 1px solid var(--beige-dark);
    padding: 2rem 1.5rem;
    height: 100%;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--beige-dark) transparent;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--beige-dark); border-radius: 2px; }
  .sidebar::-webkit-scrollbar-thumb:hover { background: var(--red); }

  .sidebar-decade { margin-bottom: 2rem; }

  .decade-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    line-height: 1.2;
    color: var(--black);
    word-break: break-all;
  }

  .decade-desc {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.75rem;
    color: var(--gray);
    letter-spacing: 0.08em;
    margin-top: 0.3rem;
    border-left: 2px solid var(--red);
    padding-left: 0.6rem;
    line-height: 1.7;
  }

  .sidebar-link {
    cursor: pointer;
    padding: 0.4rem 0.6rem;
    margin: 0 -0.6rem;
    border-left: 3px solid transparent;
    transition: border-color 0.2s, background 0.2s;
  }

  .sidebar-link:hover {
    border-left-color: var(--beige-dark);
    background: rgba(0, 0, 0, 0.06);
  }

  .sidebar-link:hover .decade-label { color: var(--black); }

  .sidebar-link.active-section { border-left-color: var(--red); }
  .sidebar-link.active-section .decade-label { color: var(--red); }

  /* ── TIMELINE CONTENT (independent scroll) ── */
  .timeline-content {
    padding: 3rem 5rem;
    height: 100%;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--beige-dark) transparent;
  }

  .timeline-content::-webkit-scrollbar { width: 4px; }
  .timeline-content::-webkit-scrollbar-track { background: transparent; }
  .timeline-content::-webkit-scrollbar-thumb { background: var(--beige-dark); border-radius: 2px; }
  .timeline-content::-webkit-scrollbar-thumb:hover { background: var(--red); }

  .sidebar-decade {
    margin-bottom: 3rem;
  }

  .decade-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    line-height: 1.2;
    color: var(--black);
    word-break: break-all;
  }

  .sidebar-link {
    cursor: pointer;
    padding: 0.4rem 0.6rem;
    margin: 0 -0.6rem;
    border-left: 3px solid transparent;
    transition: background 0.2s;
  }

  .sidebar-link:hover {
    background: rgba(0, 0, 0, 0.07);
  }

  .sidebar-link.active-section {
    border-left-color: var(--red);
  }

  .sidebar-link.active-section .decade-label {
    color: var(--red);
  }

  .decade-desc {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem;
    color: var(--gray);
    letter-spacing: 0.1em;
    margin-top: 0.4rem;
    border-left: 2px solid var(--red);
    padding-left: 0.8rem;
    line-height: 1.8;
  }

  .year-section {
    margin-bottom: 6rem;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .year-section.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .year-header {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 2.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--beige-dark);
  }

  .year-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 8vw, 6rem);
    line-height: 1;
    color: var(--black);
    position: relative;
  }

  .year-number::before {
    content: attr(data-year);
    position: absolute;
    top: 3px;
    left: 3px;
    color: var(--red);
    z-index: -1;
    opacity: 0.5;
  }

  .year-divider {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--black) 30%, transparent);
  }

  .year-era {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--red);
    writing-mode: vertical-rl;
  }

  /* ── EVENT CARDS ── */
  .events-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  .event-card {
    background: var(--beige-light);
    border: 1px solid var(--beige-dark);
    padding: 1.5rem;
    position: relative;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
    overflow: hidden;
  }

  .event-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 4px;
    height: 100%;
    background: var(--red);
    transform: scaleY(0);
    transform-origin: top;
    transition: transform 0.3s;
  }

  .event-card:hover {
    transform: translate(-2px, -2px);
    box-shadow: 4px 4px 0 var(--black);
  }

  .event-card:hover::before {
    transform: scaleY(1);
  }

  /* Featured card - large */
  .event-card.featured {
    grid-column: span 2;
    background: var(--black);
    color: var(--beige);
    border-color: var(--black);
  }

  .event-card.featured .event-date {
    color: var(--red-bright);
  }

  .event-card.featured .event-title {
    color: var(--beige);
  }

  .event-card.featured .event-desc {
    color: var(--beige-dark);
  }

  /* Red accent card */
  .event-card.accent {
    background: var(--red);
    color: var(--beige);
    border-color: var(--red-dark);
  }

  .event-card.accent .event-date {
    color: var(--beige-dark);
  }

  .event-card.accent .event-title {
    color: var(--beige);
  }

  .event-card.accent .event-desc {
    color: rgba(240,235,224,0.8);
  }

  .event-card.accent:hover {
    box-shadow: 4px 4px 0 var(--black);
  }

  .event-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5rem;
    line-height: 1;
    color: rgba(0,0,0,0.06);
    position: absolute;
    right: 0.5rem;
    top: 0;
    pointer-events: none;
    user-select: none;
  }

  .event-card.featured .event-number,
  .event-card.accent .event-number {
    color: rgba(255,255,255,0.06);
  }

  .event-date {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    color: var(--red);
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .event-date::before {
    content: '✦';
    font-size: 0.6em;
  }

  .event-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--black);
    line-height: 1.4;
    margin-bottom: 0.8rem;
  }

  .event-desc {
    font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
    font-size: 0.9rem;
    color: var(--brown);
    line-height: 1.8;
  }

  .event-tag {
    display: inline-block;
    margin-top: 1rem;
    padding: 0.2rem 0.8rem;
    border: 1px solid currentColor;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-family: 'Cormorant Garamond', serif;
    opacity: 0.7;
  }

  /* ── ADD EVENT BUTTON ── */
  .add-event-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;
    border: 2px dashed var(--beige-dark);
    padding: 2rem;
    background: none;
    cursor: pointer;
    width: 100%;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    letter-spacing: 0.15em;
    color: var(--gray);
    transition: all 0.3s;
    margin-top: 2rem;
  }

  .add-event-btn:hover {
    border-color: var(--red);
    color: var(--red);
  }

  .add-event-btn .plus {
    width: 2rem;
    height: 2rem;
    border: 1px solid currentColor;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    line-height: 1;
  }

  /* ── ADD YEAR BUTTON ── */
  .add-year-btn {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 2rem 5rem;
    border: none;
    border-top: 2px dashed var(--beige-dark);
    background: none;
    cursor: pointer;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.1em;
    color: var(--gray);
    transition: all 0.3s;
    width: 100%;
  }

  .add-year-btn:hover {
    color: var(--red);
    border-color: var(--red);
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,20,16,0.85);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--beige-light);
    border: 2px solid var(--black);
    padding: 3rem;
    width: 90%;
    max-width: 560px;
    position: relative;
    transform: translateY(20px);
    transition: transform 0.3s;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-style: italic;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--beige-dark);
  }

  .modal h2 span { color: var(--red); }

  .form-group {
    margin-bottom: 1.5rem;
  }

  .form-group label {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 0.5rem;
  }

  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    background: var(--beige);
    border: 1px solid var(--beige-dark);
    border-bottom: 2px solid var(--black);
    padding: 0.8rem 1rem;
    font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
    font-size: 1rem;
    color: var(--black);
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    border-bottom-color: var(--red);
  }

  .form-group textarea { resize: vertical; min-height: 80px; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .card-style-options {
    display: flex;
    gap: 0.8rem;
  }

  .style-btn {
    flex: 1;
    padding: 0.6rem;
    border: 2px solid var(--beige-dark);
    background: var(--beige);
    cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    transition: all 0.2s;
  }

  .style-btn.selected { border-color: var(--black); background: var(--black); color: var(--beige); }
  .style-btn.selected-red { border-color: var(--red); background: var(--red); color: var(--beige); }
  .style-btn.selected-normal { border-color: var(--black); }

  .modal-actions {
    display: flex;
    gap: 1rem;
    margin-top: 2rem;
  }

  .btn-primary {
    flex: 1;
    padding: 1rem;
    background: var(--black);
    color: var(--beige);
    border: 2px solid var(--black);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary:hover { background: var(--red); border-color: var(--red); }

  .btn-secondary {
    padding: 1rem 1.5rem;
    background: none;
    color: var(--gray);
    border: 2px solid var(--beige-dark);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-secondary:hover { border-color: var(--black); color: var(--black); }

  .modal-close {
    position: absolute;
    top: 1.5rem;
    right: 1.5rem;
    width: 2.5rem;
    height: 2.5rem;
    border: 1px solid var(--beige-dark);
    background: none;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    color: var(--gray);
  }

  .modal-close:hover { background: var(--black); color: var(--beige); border-color: var(--black); }

  /* Delete button on cards */
  .card-delete {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    width: 1.8rem;
    height: 1.8rem;
    border: 1px solid transparent;
    background: none;
    cursor: pointer;
    color: transparent;
    font-size: 0.8rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    z-index: 10;
  }

  .event-card:hover .card-delete {
    color: currentColor;
    border-color: currentColor;
    opacity: 0.4;
  }

  .event-card:hover .card-delete:hover { opacity: 1; }

  /* ── DECORATIVE ELEMENTS ── */
  .deco-line-v {
    position: absolute;
    width: 1px;
    background: var(--beige-dark);
    top: 0;
    bottom: 0;
  }

  .save-btn {
    background: none;
    border: 1px solid rgba(192, 57, 43, 0.6);
    color: var(--red);
    padding: 0.3rem 0.8rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    opacity: 0.8;
  }

  .save-btn:hover {
    background: var(--red);
    color: var(--beige);
    border-color: var(--red);
    opacity: 1;
  }

  .footer-credits {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--gray);
    font-style: italic;
  }

  .credit-divider {
    color: var(--red);
    font-size: 0.5rem;
    font-style: normal;
  }

  /* ── FOOTER ── */
  footer {
    border-top: 2px solid var(--black);
    padding: 2rem 6rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--black);
    color: var(--beige-dark);
  }

  footer p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
  }

  .footer-marks {
    display: flex;
    gap: 1.5rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--red);
  }

  /* ── SCROLL PROGRESS ── */
  .scroll-progress {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    background: var(--red);
    z-index: 9998;
    transition: width 0.1s;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header-title { animation: fadeSlideIn 0.8s ease forwards; }
  .intro-banner { animation: fadeSlideIn 0.8s ease 0.2s both; }
  .year-nav { animation: fadeSlideIn 0.6s ease 0.3s both; }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    header, .intro-banner, .year-nav, .add-year-btn { padding-left: 1.5rem; padding-right: 1.5rem; }
    main { grid-template-columns: 1fr; }
    .sidebar { position: static; border-right: none; border-bottom: 1px solid var(--beige-dark); padding: 1.5rem; }
    .timeline-content { padding: 2rem 1.5rem; }
    .events-grid { grid-template-columns: 1fr; }
    .event-card.featured { grid-column: span 1; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="scroll-progress" id="scrollProgress"></div>
<div class="corner-tl">CHRONOLOGICAL RECORD</div>
<div class="corner-tr">ARCHIVE</div>

<!-- HEADER -->
<header>
  <div class="header-left">
    <span class="header-label">歴史年表 <span class="cross">✦</span> Chronological Archive</span>
    <h1 class="header-title">His<span>t</span>ory</h1>
  </div>
  <div class="header-right">
    <div class="header-subtitle">
      HOME <span class="cross">|</span> 歴史<br>
      <span style="font-size:0.65rem; opacity:0.5;">編集可能なアーカイブ</span>
    </div>

// ── RENDER ──
function formatYear(y) {
  if (y < 0) return '紀元前 ' + Math.abs(y).toLocaleString() + ' 年頃';
  if (y < 1000) return y + ' 年頃';
  return String(y);
}
function formatYearShort(y) {
  if (y < 0) return 'BC ' + Math.abs(y).toLocaleString();
  return String(y);
}
function encodeId(year) {
  return year < 0 ? 'bc' + Math.abs(year) : String(year);
}

function render() {
  const years = historyData.map(d => d.year).sort((a, b) => a - b);

  // Sidebar
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = historyData.sort((a, b) => a.year - b.year).map(d => `
    <div class="sidebar-decade sidebar-link" data-link-year="${d.year}" onclick="scrollToYear(${d.year})">
      <div class="decade-label">${formatYearShort(d.year)}</div>
      ${d.era ? '<div class="decade-desc">' + d.era.split(' /')[0] + '</div>' : ''}
    </div>
  `).join('');

  const timeline = document.getElementById('timelineContent');
  timeline.innerHTML = historyData.sort((a, b) => a.year - b.year).map(d => `
    <div class="year-section" id="year-${encodeId(d.year)}" data-year="${d.year}">
      <div class="year-header">
        <div class="year-number" style="font-size:${d.year < 0 ? 'clamp(2rem,4vw,3rem)' : ''}">${formatYear(d.year)}</div>
        <div class="year-divider"></div>
        ${d.era ? '<div class="year-era">' + d.era + '</div>' : ''}
      </div>
      <div class="events-grid">
        ${d.events.map((e, i) => renderCard(e, d.year, i + 1)).join('')}
      </div>
      <button class="add-event-btn" onclick="openAddEventModal(${d.year})">
        <span class="plus">+</span>
        この年に出来事を追加する
      </button>
    </div>
  `).join('') + `
  <button class="add-year-btn" onclick="openAddYearModal()">
    <span class="plus" style="width:1.5rem;height:1.5rem;border:1px solid currentColor;display:inline-flex;align-items:center;justify-content:center;font-size:1.2rem;">+</span>
    新しい年を追加する
  </button>`;

  // Intersection observer for animation
  const pane = document.getElementById('timelineContent');
  const sections = document.querySelectorAll('.year-section');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) e.target.classList.add('visible');
    });
  }, { threshold: 0.1, root: pane });
  sections.forEach(s => observer.observe(s));
}

function renderCard(event, year, index) {
  const cls = event.style === 'featured' ? 'event-card featured' :
              event.style === 'accent' ? 'event-card accent' : 'event-card';
  return `
    <div class="${cls}">
      <span class="event-number">${String(index).padStart(2,'0')}</span>
      <button class="card-delete" onclick="deleteEvent(${year}, ${event.id})" title="削除">✕</button>
      <div class="event-date">${event.month || ''}</div>
      <div class="event-title">${event.title}</div>
      <div class="event-desc">${event.desc}</div>
      ${event.tag ? `<span class="event-tag">${event.tag}</span>` : ''}
    </div>
  `;
}

// ── MODALS ──
function openAddEventModal(year) {
  currentEditYear = year;
  document.getElementById('eventYear').value = year;
  document.getElementById('eventMonth').value = '';
  document.getElementById('eventTitle').value = '';
  document.getElementById('eventDesc').value = '';
  document.getElementById('eventTag').value = '';
  selectedStyle = 'normal';
  updateStyleButtons();
  document.getElementById('eventModal').classList.add('open');
}

function openAddYearModal() {
  document.getElementById('newYear').value = '';
  document.getElementById('newYearEra').value = '';
  document.getElementById('yearModal').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function selectStyle(s) {
  selectedStyle = s;
  updateStyleButtons();
}

function updateStyleButtons() {
  ['normal','featured','accent'].forEach(s => {
    const btn = document.getElementById('style' + s.charAt(0).toUpperCase() + s.slice(1));
    btn.className = 'style-btn';
    if (s === selectedStyle) {
      btn.className = 'style-btn ' + (s === 'featured' ? 'selected' : s === 'accent' ? 'selected-red' : 'selected-normal');
    }
  });
}

function saveEvent() {
  const year = parseInt(document.getElementById('eventYear').value);
  const month = document.getElementById('eventMonth').value.trim();
  const title = document.getElementById('eventTitle').value.trim();
  const desc = document.getElementById('eventDesc').value.trim();
  const tag = document.getElementById('eventTag').value.trim();

  if (!year || !title) { alert('年とタイトルは必須です。'); return; }

  let yearData = historyData.find(d => d.year === year);
  if (!yearData) {
    yearData = { year, era: '', events: [] };
    historyData.push(yearData);
  }

  yearData.events.push({ id: nextId++, month, title, desc, tag, style: selectedStyle });
  closeModal('eventModal');
  render();
  setTimeout(() => scrollToYear(year), 100);
}

function saveYear() {
  const year = parseInt(document.getElementById('newYear').value);
  const era = document.getElementById('newYearEra').value.trim();

  if (!year) { alert('年を入力してください。'); return; }
  if (historyData.find(d => d.year === year)) { alert('その年はすでに存在します。'); return; }

  historyData.push({ year, era, events: [] });
  closeModal('yearModal');
  render();
  setTimeout(() => scrollToYear(year), 100);
}

function deleteEvent(year, id) {
  if (!confirm('この出来事を削除しますか？')) return;
  const yearData = historyData.find(d => d.year === year);
  if (yearData) yearData.events = yearData.events.filter(e => e.id !== id);
  render();
}

function scrollToYear(year) {
  const el = document.getElementById('year-' + encodeId(year));
  const pane = document.getElementById('timelineContent');
  if (el && pane) {
    const paneTop = pane.getBoundingClientRect().top;
    const elTop = el.getBoundingClientRect().top;
    pane.scrollBy({ top: elTop - paneTop - 24, behavior: 'smooth' });
  }
}

// Scroll progress — driven by timeline pane
function onTimelineScroll() {
  const pane = document.getElementById('timelineContent');
  const scrollTop = pane.scrollTop;
  const scrollHeight = pane.scrollHeight - pane.clientHeight;
  const progress = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
  document.getElementById('scrollProgress').style.width = progress + '%';

  // Highlight active year in nav and sidebar
  const paneRect = pane.getBoundingClientRect();
  const threshold = paneRect.top + 80;
  document.querySelectorAll('.year-section').forEach(section => {
    const rect = section.getBoundingClientRect();
    if (rect.top <= threshold && rect.bottom >= threshold) {
      const year = parseInt(section.dataset.year);
      document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active-section'));
      const target = document.querySelector('.sidebar-link[data-link-year="' + year + '"]');
      if (target) {
        target.classList.add('active-section');
        const sidebar = document.getElementById('sidebar');
        const targetRect = target.getBoundingClientRect();
        const sidebarRect = sidebar.getBoundingClientRect();
        if (targetRect.top < sidebarRect.top + 40 || targetRect.bottom > sidebarRect.bottom - 40) {
          sidebar.scrollBy({ top: targetRect.top - sidebarRect.top - sidebarRect.height / 2, behavior: 'smooth' });
        }
      }
    }
  });
}

document.addEventListener('DOMContentLoaded', () => {
  const pane = document.getElementById('timelineContent');
  if (pane) pane.addEventListener('scroll', onTimelineScroll);
});

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

function saveAsHTML() {
  // Get the current page HTML and replace the historyData variable with current data
  const currentData = JSON.stringify(historyData, null, 2);
  let html = document.documentElement.outerHTML;
  // Replace the historyData array in the source with the current state
  html = html.replace(
    /let historyData = \[[\s\S]*?\];(\s*let selectedStyle)/,
    'let historyData = ' + currentData + ';\n$1'
  );
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'history-timeline.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

// Init
render();
</script>
</body>
</html>
